<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人健康追蹤助手 (Gemini 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .active-tab { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">
    <nav class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-md mx-auto px-4">
            <div class="flex justify-between h-16 items-center">
                <h1 class="text-xl font-bold text-gray-800">健康追蹤</h1>
                <div id="api-status" class="text-xs px-2 py-1 rounded bg-gray-200 text-gray-600">API 未設定</div>
            </div>
            <div class="flex justify-around text-sm font-medium">
                <button onclick="switchTab('dashboard')" class="tab-btn pb-2 active-tab" id="tab-dashboard">總覽</button>
                <button onclick="switchTab('diet')" class="tab-btn pb-2" id="tab-diet">飲食</button>
                <button onclick="switchTab('exercise')" class="tab-btn pb-2" id="tab-exercise">運動</button>
                <button onclick="switchTab('settings')" class="tab-btn pb-2" id="tab-settings">設定</button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <!-- 儀表板 -->
        <section id="sec-dashboard" class="space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h2 class="text-gray-500 text-sm mb-2">今日卡路里淨值</h2>
                <div class="text-3xl font-bold text-blue-600" id="net-calories">0 kcal</div>
                <div class="grid grid-cols-2 gap-4 mt-4 text-center">
                    <div class="bg-green-50 p-2 rounded">
                        <div class="text-xs text-green-600">攝取</div>
                        <div class="font-bold text-green-700" id="total-intake">0</div>
                    </div>
                    <div class="bg-orange-50 p-2 rounded">
                        <div class="text-xs text-orange-600">消耗</div>
                        <div class="font-bold text-orange-700" id="total-burn">0</div>
                    </div>
                </div>
            </div>
            <canvas id="weeklyChart" class="bg-white p-4 rounded-xl shadow-sm"></canvas>
        </section>

        <!-- 飲食記錄 -->
        <section id="sec-diet" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold mb-3">AI 拍照辨識食物</h3>
                <input type="file" id="diet-image" accept="image/*" class="hidden" onchange="analyzeImage('diet')">
                <button onclick="document.getElementById('diet-image').click()" class="w-full py-3 bg-blue-500 text-white rounded-lg font-medium">📸 拍照或上傳</button>
                <p class="text-xs text-gray-400 mt-2">提示：將由 Gemini Pro 協助估算熱量</p>
            </div>
            <div id="diet-list" class="space-y-2"></div>
        </section>

        <!-- 運動記錄 -->
        <section id="sec-exercise" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold mb-3">AI 讀取運動紀錄</h3>
                <input type="file" id="ex-image" accept="image/*" class="hidden" onchange="analyzeImage('exercise')">
                <button onclick="document.getElementById('ex-image').click()" class="w-full py-3 bg-orange-500 text-white rounded-lg font-medium">📋 上傳截圖或表格</button>
            </div>
            <div id="exercise-list" class="space-y-2"></div>
        </section>

        <!-- 設定頁面 -->
        <section id="sec-settings" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold mb-3">API 金鑰設定</h3>
                <input type="password" id="api-key" class="w-full border rounded p-2 mb-4" placeholder="貼上你的 Gemini API Key">
                <button onclick="saveSettings()" class="w-full py-2 bg-gray-800 text-white rounded">儲存設定</button>
            </div>
            <button onclick="clearData()" class="w-full py-2 text-red-500 border border-red-500 rounded">清除所有本地資料</button>
        </section>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('health_db')) || { diet: [], exercise: [], settings: { apiKey: "" } };

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            if(tab === 'diet') renderDiet();
            if(tab === 'exercise') renderExercise();
            if(tab === 'dashboard') renderDashboard();
        }

        function saveSettings() {
            db.settings.apiKey = document.getElementById('api-key').value;
            saveDB();
            alert('設定已儲存！');
            updateStatus();
        }

        function updateStatus() {
            const status = document.getElementById('api-status');
            if(db.settings.apiKey) {
                status.innerText = "Gemini 已連線";
                status.classList.replace('bg-gray-200', 'bg-green-100');
            }
        }

        async function analyzeImage(type) {
            const apiKey = db.settings.apiKey;
            if(!apiKey) return alert('請先到設定頁面填入 Gemini API Key');
            
            const fileInput = document.getElementById(type === 'diet' ? 'diet-image' : 'ex-image');
            const file = fileInput.files[0];
            if(!file) return;

            const base64Image = await toBase64(file);
            const statusLabel = type === 'diet' ? '辨識食物中...' : '解析運動中...';
            alert(statusLabel);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: type === 'diet' ? 
                                    "請分析這張食物照片，回傳格式為 JSON: { \"name\": \"食物名稱\", \"calories\": 數字 }" : 
                                    "請分析這張運動紀錄截圖，回傳格式為 JSON: { \"name\": \"運動類型\", \"calories\": 數字 }" },
                                { inline_data: { mime_type: file.type, data: base64Image.split(',')[1] } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(text.match(/\{.*\}/s)[0]);

                db[type].push({ ...result, date: new Date().toLocaleDateString(), id: Date.now() });
                saveDB();
                type === 'diet' ? renderDiet() : renderExercise();
            } catch (e) {
                console.error(e);
                alert('辨識失敗，請確認 API Key 是否正確或網路是否通暢。');
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function saveDB() { localStorage.setItem('health_db', JSON.stringify(db)); }
        
        function renderDiet() {
            const list = document.getElementById('diet-list');
            list.innerHTML = db.diet.map(i => `<div class="bg-white p-3 rounded shadow-sm flex justify-between"><span>${i.name}</span><span class="text-green-600 font-bold">${i.calories} kcal</span></div>`).join('');
        }

        function renderExercise() {
            const list = document.getElementById('exercise-list');
            list.innerHTML = db.exercise.map(i => `<div class="bg-white p-3 rounded shadow-sm flex justify-between"><span>${i.name}</span><span class="text-orange-600 font-bold">-${i.calories} kcal</span></div>`).join('');
        }

        function renderDashboard() {
            const intake = db.diet.reduce((sum, i) => sum + i.calories, 0);
            const burn = db.exercise.reduce((sum, i) => sum + i.calories, 0);
            document.getElementById('total-intake').innerText = intake;
            document.getElementById('total-burn').innerText = burn;
            document.getElementById('net-calories').innerText = `${intake - burn} kcal`;
        }

        function clearData() { if(confirm('確定要清除所有資料嗎？')) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            updateStatus();
            renderDashboard();
            if(db.settings.apiKey) document.getElementById('api-key').value = db.settings.apiKey;
        };
    </script>
</body>
</html>
