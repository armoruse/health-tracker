<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人健康追蹤助手 (Gemini 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">
    <nav class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-md mx-auto px-4">
            <div class="flex justify-between h-16 items-center">
                <h1 class="text-xl font-bold text-gray-800">健康追蹤</h1>
                <div id="api-status" class="text-xs px-2 py-1 rounded bg-gray-200 text-gray-600">API 未設定</div>
            </div>
            <div class="flex justify-around text-sm font-medium">
                <button onclick="switchTab('dashboard')" class="tab-btn pb-2 active-tab" id="tab-dashboard">總覽</button>
                <button onclick="switchTab('diet')" class="tab-btn pb-2" id="tab-diet">飲食</button>
                <button onclick="switchTab('exercise')" class="tab-btn pb-2" id="tab-exercise">運動</button>
                <button onclick="switchTab('settings')" class="tab-btn pb-2" id="tab-settings">設定</button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <section id="sec-dashboard">
            <div class="bg-white p-4 rounded-xl shadow-sm text-center">
                <h2 class="text-gray-500 text-sm mb-2">今日淨卡路里</h2>
                <div class="text-3xl font-bold text-blue-600" id="net-calories">0 kcal</div>
            </div>
        </section>

        <section id="sec-diet" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold mb-3">📸 拍照辨識食物</h3>
                <input type="file" id="diet-image" accept="image/*" onchange="analyzeImage('diet')" class="w-full">
            </div>
            <div id="diet-list" class="space-y-2"></div>
        </section>

        <section id="sec-exercise" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold mb-3">📋 讀取運動紀錄</h3>
                <input type="file" id="ex-image" accept="image/*" onchange="analyzeImage('exercise')" class="w-full">
            </div>
            <div id="exercise-list" class="space-y-2"></div>
        </section>

        <section id="sec-settings" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold mb-3">API 金鑰設定</h3>
                <input type="password" id="api-key" class="w-full border rounded p-2 mb-4" placeholder="貼上新的 API Key">
                <button onclick="saveSettings()" class="w-full py-2 bg-gray-800 text-white rounded">儲存設定</button>
            </div>
        </section>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('health_db')) || { diet: [], exercise: [], settings: { apiKey: "" } };

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            if(tab === 'diet') renderDiet();
            if(tab === 'exercise') renderExercise();
            if(tab === 'dashboard') renderDashboard();
        }

        function saveSettings() {
            db.settings.apiKey = document.getElementById('api-key').value;
            saveDB();
            alert('金鑰已儲存！');
            updateStatus();
        }

        function updateStatus() {
            const status = document.getElementById('api-status');
            if(db.settings.apiKey) {
                status.innerText = "Gemini 已準備就緒";
                status.className = "text-xs px-2 py-1 rounded bg-green-100 text-green-600";
            }
        }

        async function analyzeImage(type) {
            const apiKey = db.settings.apiKey;
            if(!apiKey) return alert('請先到設定頁面填入 API Key');
            
            const fileInput = document.getElementById(type === 'diet' ? 'diet-image' : 'ex-image');
            const file = fileInput.files[0];
            if(!file) return;

            const base64Image = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "分析圖片並回傳 JSON 格式：{\"name\":\"名稱\",\"calories\":數字}。不要回傳其他文字。" },
                                { inline_data: { mime_type: file.type, data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const result = JSON.parse(text);

                db[type].push({ ...result, date: new Date().toLocaleDateString(), id: Date.now() });
                saveDB();
                type === 'diet' ? renderDiet() : renderExercise();
                alert('辨識成功！');
            } catch (e) {
                alert('辨識錯誤，請確認金鑰是否有效。');
            }
        }

        function saveDB() { localStorage.setItem('health_db', JSON.stringify(db)); }
        function renderDiet() { document.getElementById('diet-list').innerHTML = db.diet.map(i => `<div class="bg-white p-3 rounded flex justify-between"><span>${i.name}</span><b>${i.calories} kcal</b></div>`).join(''); }
        function renderExercise() { document.getElementById('exercise-list').innerHTML = db.exercise.map(i => `<div class="bg-white p-3 rounded flex justify-between"><span>${i.name}</span><b class="text-orange-500">-${i.calories} kcal</b></div>`).join(''); }
        function renderDashboard() {
            const intake = db.diet.reduce((s, i) => s + i.calories, 0);
            const burn = db.exercise.reduce((s, i) => s + i.calories, 0);
            document.getElementById('net-calories').innerText = `${intake - burn} kcal`;
        }

        window.onload = () => { if(db.settings.apiKey) document.getElementById('api-key').value = db.settings.apiKey; updateStatus(); renderDashboard(); };
    </script>
</body>
</html>
